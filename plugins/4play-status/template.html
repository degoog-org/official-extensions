<div id="fourplay-status" class="command-result fourplay-command">
  <div class="fourplay-header">
    <div class="fourplay-heading">
      <span class="fourplay-logo"><i class="fa-solid fa-tower-broadcast"></i></span>
      <div class="fourplay-heading-text">
        <span class="fourplay-title">4play transport</span>
        <span class="fourplay-subtitle" data-subtitle>resolving transport</span>
      </div>
    </div>
    <div class="fourplay-actions">
      <span class="fourplay-conn" data-conn data-tone="muted">
        <span class="fourplay-dot"></span>
        <span data-conn-label>checking</span>
      </span>
      <button type="button" class="degoog-icon-btn fourplay-refresh" data-refresh aria-label="Refresh status" title="Refresh">
        <i class="fa-solid fa-rotate"></i>
      </button>
      <button type="button" class="fourplay-btn fourplay-btn--danger" data-clear-all hidden>
        <i class="fa-solid fa-broom"></i>
        Clear all
      </button>
    </div>
  </div>
  <div class="fourplay-body" data-body>
    <div class="fourplay-hero degoog-panel">
      <i class="fa-solid fa-satellite-dish fourplay-hero-icon"></i>
      <div class="fourplay-hero-text">Loading transport status...</div>
    </div>
  </div>
</div>
